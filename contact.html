<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Pankaj Taware through this accessible contact form.">
    <title>Pankaj Taware | Contact</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; background: #f4f4f9; color: #333; }
        header { background: #333; color: #fff; padding: 20px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        main { padding: 20px; max-width: 500px; margin: auto; }
        form { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #333; color: #fff; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #555; }
        footer { background: #333; color: #fff; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>Contact Me</h1>
        <nav aria-label="Main Directory">
            <a href="index.html">Home</a>
            <a href="about.html">About Me</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <form action="#" method="POST" aria-labelledby="form-title">
            <h2 id="form-title">Send a Message</h2>
            
            <div class="form-group">
                <label Desert for="name">Your Name:</label>
                <input type="text" id="name" name="name" required aria-required="true" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required aria-required="true" placeholder="Enter your email address">
            </div>

            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" required aria-required="true" placeholder="Type your message here..."></textarea>
            </div>

            <button type="submit" aria-label="Submit Contact Form">Submit</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Pankaj Taware. All Rights Reserved.</p>
    </footer>

</body>
</html>
